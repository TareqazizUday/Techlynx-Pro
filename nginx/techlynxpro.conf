# HTTP — redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name www.techlynxpro.com;
    return 301 https://techlynxpro.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name techlynxpro.com;
    return 301 https://techlynxpro.com$request_uri;
}

# HTTPS — www to non-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.techlynxpro.com;

    ssl_certificate /etc/letsencrypt/live/techlynxpro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techlynxpro.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://techlynxpro.com$request_uri;
}

# HTTPS — main site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name techlynxpro.com;

    ssl_certificate /etc/letsencrypt/live/techlynxpro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techlynxpro.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2
        font/woff
        application/font-woff
        application/vnd.ms-fontobject;

    location /static/ {
        alias /home/ec2-user/techlynxpro/staticfiles/;
        gzip_static on;
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    location /media/ {
        alias /home/ec2-user/techlynxpro/media/;
        gzip_static on;
        expires 1d;
        add_header Cache-Control "public, max-age=86400, must-revalidate";
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
